<!DOCTYPE html>

<style>
  body { margin:0; min-height:100vh; background:rgba(5,12,28,0.92); display:flex; align-items:center; justify-content:center; padding:24px; font-family:'DM Sans',sans-serif; }

  .ep-card { display:grid; grid-template-columns:1fr 1fr; max-width:920px; width:100%; border-radius:20px; overflow:hidden; box-shadow:0 40px 100px rgba(0,0,0,0.55); font-family:'DM Sans',sans-serif; }

  .ep-left { position:relative; line-height:0; }
  .ep-poster { width:100%; height:100%; object-fit:cover; display:block; }

  /* Right side — light gray theme */
  .ep-right {

    padding:48px 44px;
    display:flex; flex-direction:column; justify-content:center;
    position:relative; overflow:hidden;
  }
  /* subtle green accent glow in the corner */
  .ep-right::before {
    content:''; position:absolute; top:-80px; right:-80px;
    width:240px; height:240px;
    background: radial-gradient(circle, rgba(40,160,80,0.10) 0%, transparent 70%);
    pointer-events:none;
  }
  .ep-right > * { position:relative; z-index:1; }

  .ep-eyebrow {
    display:inline-block; width:fit-content;
    font-size:10px; font-weight:800; letter-spacing:2.5px; text-transform:uppercase;
    color:#1f9d4d; margin-bottom:14px;
  }
  .ep-form-title {
    font-size:26px; font-weight:800; color:#0d2040;
    margin:0 0 8px; line-height:1.2;
  }
  .ep-form-title span { color:#1f9d4d; }
  .ep-form-sub {
    font-size:14px; color:#6b7280;
    margin:0 0 26px; line-height:1.5;
  }
  .ep-field { margin-bottom:14px; }
  .ep-input {
    width:100%; padding:15px 16px;
    background:#ffffff;
    border:1.5px solid #d1d5db;
    border-radius:10px;
    font-size:14.5px; color:#1a202c;
    outline:none; transition:border-color 0.2s, box-shadow 0.2s;
    font-family:inherit;
  }
  .ep-input:focus {
    border-color:#1f9d4d;
    box-shadow:0 0 0 3px rgba(31,157,77,0.12);
  }
  .ep-input::placeholder { color:#9ca3af; }

  /* CTA — dark with green glow, matching the "REGISTER NOW" button on the poster */
  .ep-submit {
    display:block; width:100%; padding:17px;
    background: #0a1929;
    color:#fff;
    font-size:14.5px; font-weight:800;
    border:1.5px solid rgba(143,255,143,0.4);
    border-radius:50px;
    cursor:pointer;
    margin-top:8px;
    font-family:inherit;
    letter-spacing:1px;
    text-transform:uppercase;
    text-align:center;
    text-decoration:none;
    box-sizing:border-box;
    box-shadow:
      0 0 30px rgba(143,255,143,0.35),
      0 0 60px rgba(143,255,143,0.15),
      inset 0 0 20px rgba(143,255,143,0.05);
    transition: box-shadow 0.25s, transform 0.15s, border-color 0.2s;
    position:relative;
  }
  .ep-submit:hover {
    transform:translateY(-2px);
    border-color: rgba(143,255,143,0.7);
    box-shadow:
      0 0 40px rgba(143,255,143,0.55),
      0 0 80px rgba(143,255,143,0.25),
      inset 0 0 25px rgba(143,255,143,0.08);
  }
  .ep-trust {
    margin-top:18px;
    font-size:11.5px; color:#6b7280;
    text-align:center; line-height:1.6;
  }
  .ep-trust strong { color:#1f9d4d; font-weight:700; }

  @media(max-width:640px) {
    .ep-card { grid-template-columns:1fr; max-width:420px; }
    .ep-right { padding:36px 28px; }
  }
</style>
